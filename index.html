<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro | 7-Day Forecast</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .weather-bg-icon {
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 320px;
            color: rgba(255, 255, 255, 0.05);
            z-index: 0;
            transform: rotate(-10deg);
            pointer-events: none;
        }

        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            text-align: center;
            z-index: 1;
        }

        /* 搜尋列 */
        .search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 8px 20px;
            margin-bottom: 20px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex: 1;
            font-size: 16px;
        }

        .search-bar button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        /* 頁面切換內容 */
        #home-page, #result-page { transition: 0.5s; }
        #result-page { display: none; }

        /* 當前天氣 */
        .main-info { margin-bottom: 30px; }
        .temp { font-size: 70px; font-weight: 600; line-height: 1; }
        .location { font-size: 24px; font-weight: 300; }

        /* 一週預報區塊 */
        /* 修正後的預報區塊，確保可以滑動且不被遮擋 */
.forecast-container {
    margin-top: 30px;
    display: flex;
    overflow-x: auto; /* 確保橫向溢出時可以滑動 */
    overflow-y: hidden; /* 隱藏縱向捲軸 */
    gap: 15px;
    padding: 10px 5px; /* 增加邊距避免陰影被切掉 */
    width: 100%; /* 確保寬度填滿容器 */
    -webkit-overflow-scrolling: touch; /* 優化手機端滑動手感 */
}

/* 確保預報小卡不會被壓縮，維持固定寬度 */
.forecast-card {
    background: rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 20px;
    min-width: 100px; /* 增加最小寬度，確保文字不擠壓 */
    flex-shrink: 0; /* 防止卡片因為空間不足而被擠扁 */
    border: 1px solid var(--border);
    text-align: center;
}

/* 顯示捲軸（選用）：如果你希望使用者知道可以滑動，可以加入簡單的捲軸樣式 */
.forecast-container::-webkit-scrollbar {
    height: 6px;
}
.forecast-container::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 10px;
}

        .forecast-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            min-width: 90px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .forecast-card .date { font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
        .forecast-card img { width: 45px; }
        .forecast-card .f-temp { font-size: 16px; font-weight: 600; }

        .back-btn {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
        }

        .error-hint { color: #ff8a80; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <i class="fa-solid fa-cloud-sun weather-bg-icon"></i>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="city-input" placeholder="Search City..." spellcheck="false">
            <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <p class="error-hint" id="error-text">City not found. Try again!</p>

        <div id="home-page">
            <i class="fa-solid fa-cloud-sun-rain" style="font-size: 100px; color: #ffd700; margin: 30px 0;"></i>
            <h1 style="letter-spacing: 2px;">SkyCast AI</h1>
            <p style="opacity: 0.7; font-weight: 300;">Explore Current & Weekly Forecasts</p>
        </div>

        <div id="result-page">
            <div class="main-info">
                <img id="w-icon" src="" alt="icon" style="width: 100px;">
                <div class="temp" id="w-temp">--°C</div>
                <div class="location" id="w-city">City</div>
                <p id="w-desc" style="text-transform: capitalize; opacity: 0.8;">Condition</p>
            </div>

            <h3 style="text-align: left; font-size: 16px; margin-bottom: 10px; font-weight: 400;">
                <i class="fa-regular fa-calendar-days"></i> 5-Day Forecast
            </h3>
            
            <div class="forecast-container" id="forecast-list">
                </div>

            <button class="back-btn" onclick="goHome()">Back to Home</button>
        </div>
    </div>

    <script>
        const API_KEY = "f00c38e0279b7bc85480c3fe775d518c";

        async function fetchAllWeather(city) {
            if (!city) return;
            // 使用 Forecast API (包含當前與未來 5 天/每 3 小時的數據)
            const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    displayData(data);
                } else {
                    showError();
                }
            } catch (err) {
                showError();
            }
        }

        function displayData(data) {
            document.getElementById("home-page").style.display = "none";
            document.getElementById("error-text").style.display = "none";
            document.getElementById("result-page").style.display = "block";

            // 1. 填入當前天氣 (取清單第一個)
            const current = data.list[0];
            document.getElementById("w-city").innerText = data.city.name;
            document.getElementById("w-temp").innerText = Math.round(current.main.temp) + "°C";
            document.getElementById("w-desc").innerText = current.weather[0].description;
            document.getElementById("w-icon").src = `https://openweathermap.org/img/wn/${current.weather[0].icon}@4x.png`;

            // 2. 處理預報 (每 8 筆資料代表一天，因為 API 是每 3 小時一筆)
            const forecastList = document.getElementById("forecast-list");
            forecastList.innerHTML = ""; // 清空

            for (let i = 7; i < data.list.length; i += 8) {
                const dayData = data.list[i];
                const date = new Date(dayData.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });

                const card = document.createElement("div");
                card.className = "forecast-card";
                card.innerHTML = `
                    <p class="date">${dayName}</p>
                    <img src="https://openweathermap.org/img/wn/${dayData.weather[0].icon}.png" alt="icon">
                    <p class="f-temp">${Math.round(dayData.main.temp)}°C</p>
                `;
                forecastList.appendChild(card);
            }
        }

        function showError() {
            document.getElementById("error-text").style.display = "block";
            document.getElementById("home-page").style.display = "block";
            document.getElementById("result-page").style.display = "none";
        }

        function goHome() {
            document.getElementById("home-page").style.display = "block";
            document.getElementById("result-page").style.display = "none";
            document.getElementById("city-input").value = "";
        }

        document.getElementById("search-btn").addEventListener("click", () => fetchAllWeather(document.getElementById("city-input").value));
        document.getElementById("city-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") fetchAllWeather(document.getElementById("city-input").value);
        });
    </script>
</body>
</html>
